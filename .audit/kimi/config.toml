# Kimi CLI Configuration for Cap3 Audit System
# Place this at ~/.kimi/config.toml or use KIMI_CONFIG_PATH

[providers.moonshot]
name = "Moonshot"
api_key = "${MOONSHOT_API_KEY}"
base_url = "https://api.moonshot.cn/v1"

[providers.moonshot.models.kimi-k2-thinking]
name = "kimi-k2-thinking"
context_window = 256000
max_tokens = 8192

[providers.moonshot.models.kimi-k2-instruct]
name = "kimi-k2-instruct"
context_window = 128000
max_tokens = 4096

[defaults]
provider = "moonshot"
model = "kimi-k2-instruct"
temperature = 0.2

[orchestrator]
provider = "moonshot"
model = "kimi-k2-thinking"
temperature = 0.3

[logging]
level = "info"
format = "json"

[loop_control]
max_steps_per_turn = 120
compaction_threshold = 0.8
context_reservation_tokens = 4000
